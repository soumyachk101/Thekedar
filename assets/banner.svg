<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Thekedar — AI coding crew site supervisor. kaam pakka, hisaab saaf.">
  <title>THEKEDAR — kaam pakka · hisaab saaf</title>
  <defs>
    <radialGradient id="bgv" cx="0.5" cy="0.42" r="0.9">
      <stop offset="0" stop-color="#123A67"/>
      <stop offset="1" stop-color="#081F3C"/>
    </radialGradient>
    <pattern id="gMinor" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#DBEBFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="gMajor" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" fill="none" stroke="#DBEBFF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    .ltr{fill:none;stroke:#EAF4FF;stroke-width:9;stroke-linecap:square;stroke-linejoin:miter;
         stroke-dasharray:102;stroke-dashoffset:102;
         animation:draw .55s cubic-bezier(.45,.08,.55,.92) forwards}
    .l1{animation-delay:.08s}.l2{animation-delay:.24s}.l3{animation-delay:.40s}.l4{animation-delay:.56s}
    .l5{animation-delay:.72s}.l6{animation-delay:.88s}.l7{animation-delay:1.04s}.l8{animation-delay:1.20s}
    @keyframes draw{to{stroke-dashoffset:0}}

    .dim{fill:none;stroke:#BFDCF7;stroke-width:1.4;stroke-linecap:butt;opacity:0;
         stroke-dasharray:102;stroke-dashoffset:102;
         animation:dimdraw .5s ease-out forwards}
    .dimA{animation-delay:1.8s}
    .dimB{animation-delay:1.95s}
    @keyframes dimdraw{from{opacity:1;stroke-dashoffset:102}to{opacity:1;stroke-dashoffset:0}}

    .ann{opacity:0;animation:fadein .45s ease-out forwards}
    .a1{animation-delay:.25s}
    .a2{animation-delay:2.3s}
    @keyframes fadein{to{opacity:1}}

    .rise{opacity:0;transform-box:fill-box;
          animation:rise .55s cubic-bezier(.2,.7,.3,1) 2.45s forwards}
    @keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

    .stamp{opacity:0;transform-box:fill-box;transform-origin:50% 50%;
           animation:stampin .5s cubic-bezier(.16,1.1,.3,1) 2.75s forwards}
    @keyframes stampin{
      0%{opacity:0;transform:scale(2.5)}
      55%{opacity:1;transform:scale(.93)}
      76%{transform:scale(1.04)}
      100%{opacity:1;transform:scale(1)}}

    .pulse{animation:pulse 5s ease-in-out 3.7s infinite}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}

    @media (prefers-reduced-motion:reduce){
      .ltr,.dim{animation:none;stroke-dashoffset:0;opacity:1}
      .ann,.rise,.stamp{animation:none;opacity:1;transform:none}
      .pulse{animation:none}
    }
  </style>

  <!-- ============ SHEET ============ -->
  <rect x="0" y="0" width="1200" height="300" fill="url(#bgv)"/>
  <rect x="0" y="0" width="1200" height="300" fill="url(#gMinor)"/>
  <rect x="0" y="0" width="1200" height="300" fill="url(#gMajor)"/>
  <rect x="10" y="10" width="1180" height="280" fill="none" stroke="#BFDCF7" stroke-opacity=".3" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="260" fill="none" stroke="#DBEBFF" stroke-opacity=".7" stroke-width="1.5"/>

  <!-- title block (pre-printed on the sheet) -->
  <g font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" letter-spacing=".4">
    <rect x="860" y="228" width="320" height="52" fill="none" stroke="#DBEBFF" stroke-opacity=".7" stroke-width="1.2"/>
    <path d="M860 245.3 H1180 M860 262.6 H1180 M940 228 V280" fill="none" stroke="#DBEBFF" stroke-opacity=".4" stroke-width="1"/>
    <g fill="#DBEBFF" font-size="9" text-anchor="end" fill-opacity=".5">
      <text x="932" y="240">PROJECT</text>
      <text x="932" y="257.5">DRAWN BY</text>
      <text x="932" y="274.5">SHEET</text>
    </g>
    <g fill="#EAF4FF" font-size="9" fill-opacity=".85">
      <text x="950" y="240">THEKEDAR · AI CODING CREW SUPERVISOR</text>
      <text x="950" y="257.5">MUNSHI — THE CLERK WRITES IT DOWN</text>
      <text x="950" y="274.5">01 / 01 · SCALE 1:1 · REV A · IFC</text>
    </g>
  </g>

  <!-- top-right drawing number + registration mark -->
  <text x="1126" y="43" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="10" letter-spacing="1" text-anchor="end" fill="#DBEBFF" fill-opacity=".5">DRG NO. TK-01 · ISSUE FOR CONSTRUCTION</text>
  <g class="pulse" opacity=".3" stroke="#BFDCF7" stroke-width="1" fill="none">
    <circle cx="1152" cy="39" r="7.5"/>
    <path d="M1152 26 V52 M1139 39 H1165"/>
  </g>

  <!-- ============ HEADER ROW ============ -->
  <g class="ann a1">
    <text x="75" y="77" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="26" fill="#EAF4FF" fill-opacity=".92">ठेकेदार</text>
    <text x="182" y="73" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
          font-size="10.5" letter-spacing="1" fill="#DBEBFF" fill-opacity=".55">· SITE SUPERVISOR FOR AI CODING CREWS</text>
  </g>

  <!-- ============ WORDMARK : draws itself ============ -->
  <!-- letter cell 56×90, advance 82, baseline grid y 95→185 -->
  <g>
    <g transform="translate(75,95)">   <path class="ltr l1" pathLength="100" d="M4.5 4.5 H51.5 M28 13.5 V85.5"/> </g>
    <g transform="translate(157,95)">  <path class="ltr l2" pathLength="100" d="M4.5 4.5 V85.5 M51.5 4.5 V85.5 M13.5 45 H42.5"/> </g>
    <g transform="translate(239,95)">  <path class="ltr l3" pathLength="100" d="M4.5 4.5 V85.5 M13.5 4.5 H51.5 M13.5 45 H45.5 M13.5 85.5 H51.5"/> </g>
    <g transform="translate(321,95)">  <path class="ltr l4" pathLength="100" d="M4.5 4.5 V85.5 M51.5 4.5 L16 45 L51.5 85.5"/> </g>
    <g transform="translate(403,95)">  <path class="ltr l5" pathLength="100" d="M4.5 4.5 V85.5 M13.5 4.5 H51.5 M13.5 45 H45.5 M13.5 85.5 H51.5"/> </g>
    <g transform="translate(485,95)">  <path class="ltr l6" pathLength="100" d="M4.5 4.5 V85.5 M13.5 4.5 H29 C46 4.5 51.5 21 51.5 45 C51.5 69 46 85.5 29 85.5 H13.5"/> </g>
    <g transform="translate(567,95)">  <path class="ltr l7" pathLength="100" d="M4.5 85.5 L20.5 4.5 H35.5 L51.5 85.5 M14.5 58 H41.5"/> </g>
    <g transform="translate(649,95)">  <path class="ltr l8" pathLength="100" d="M4.5 4.5 V85.5 M13.5 4.5 H30 C45 4.5 50.5 12 50.5 25 C50.5 38 45 46 30 46 H13.5 M31 46 L51.5 85.5"/> </g>
  </g>

  <!-- construction geometry (faint, fades in with annotations) -->
  <g class="ann a2" fill="none" stroke="#BFDCF7">
    <path d="M48 140 H707" stroke-width="1" stroke-opacity=".18" stroke-dasharray="14 5 3 5"/>
    <circle cx="517.5" cy="140" r="47" stroke-width="1" stroke-opacity=".2" stroke-dasharray="4 6"/>
    <path d="M567.5 200.7 L592.3 75.2" stroke-width="1" stroke-opacity=".2"/>
  </g>

  <!-- ============ DIMENSIONS ============ -->
  <!-- horizontal: full wordmark width -->
  <path class="dim dimA" pathLength="100" d="M75 196 V218 M705 196 V218 M75 212 H705 M85 208 L75 212 L85 216 M695 208 L705 212 L695 216"/>
  <!-- vertical: cap height -->
  <path class="dim dimB" pathLength="100" d="M711 95 H737 M711 185 H737 M727 95 V185 M723 105 L727 95 L731 105 M723 175 L727 185 L731 175"/>

  <g class="ann a2" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" fill="#DBEBFF">
    <text x="390" y="206" font-size="11" letter-spacing="1" text-anchor="middle" fill-opacity=".85">630 — 8 LETTERS · GRID 82</text>
    <text x="747" y="140" font-size="11" letter-spacing="1" text-anchor="middle" fill-opacity=".85" transform="rotate(-90 747 140)">90 TYP.</text>
  </g>

  <!-- ============ TAGLINE ============ -->
  <g class="rise">
    <text x="75" y="262" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
          font-size="14.5" letter-spacing="3" fill="#EAF4FF" fill-opacity=".95">kaam pakka · hisaab saaf</text>
    <text x="392" y="262" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
          font-size="10.5" letter-spacing="1" fill="#DBEBFF" fill-opacity=".5">— solid work · clean records</text>
  </g>

  <!-- ============ INSPECTION STAMP : thunks in last ============ -->
  <g transform="translate(920,136) rotate(-8)">
    <g class="stamp" opacity=".95">
      <rect x="-105" y="-46" width="210" height="92" rx="8" fill="none" stroke="#FF5D4A" stroke-width="3.5"/>
      <rect x="-98" y="-39" width="196" height="78" rx="5" fill="none" stroke="#FF5D4A" stroke-width="1.2" stroke-opacity=".85"/>
      <text x="4" y="2" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="34"
            letter-spacing="8" text-anchor="middle" fill="#FF5D4A">PASS</text>
      <path d="M-86 12 H86" stroke="#FF5D4A" stroke-width="1" stroke-opacity=".7"/>
      <text x="2" y="30" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
            font-size="12.5" letter-spacing="4" text-anchor="middle" fill="#FF5D4A" fill-opacity=".95">kaam pakka</text>
    </g>
  </g>
</svg>
