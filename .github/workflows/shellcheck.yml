name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck every script
        run: |
          # SC2317 (unreachable code) false-positives on hooks that always exit 0/2 via
          # early returns inside case/if chains — allowlisted repo-wide, everything else
          # must be clean per CONTRIBUTING.md's shellcheck rule.
          shopt -s globstar nullglob
          files=(./*.sh hooks/*.sh scripts/*.sh scripts/factory/*.sh tests/*.sh)
          echo "Checking: ${files[*]}"
          shellcheck -e SC2317 "${files[@]}"
